; growmie-hub  -- ESP32-S3 firmware for the always-on grow-room hub
;
; Build:
;   pio run -e esp32-s3
;
; Flash + monitor:
;   pio run -e esp32-s3 -t upload
;   pio device monitor -b 115200
;
; First boot:
;   - Hub opens a "Growmie-Hub-XXXX" WiFi AP. Connect to it on your phone.
;   - Captive portal pops up. Choose your home WiFi + paste:
;       * Supabase URL + anon key (and either a hub JWT or service-role key)
;       * Hub UUID
;   - Settings are stored in NVS; subsequent boots come up headless.
; Per-device Tuya local_keys are loaded from the Supabase `devices` table on
; every device-list refresh. No Tuya cloud account is needed at runtime.

[platformio]
default_envs = esp32-s3

[env:esp32-s3]
platform        = espressif32@^6.7.0
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

board_build.partitions    = default.csv
board_build.flash_size    = 8MB
board_upload.flash_size   = 8MB

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DGROW_HUB_FW_VERSION=\"0.1.0\"
  -DARDUINOJSON_USE_LONG_LONG=1
  -std=gnu++17

build_unflags =
  -std=gnu++11

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17
  links2004/WebSockets@^2.4.1
