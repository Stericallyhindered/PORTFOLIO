name: grannas_t56
description: Grannas Racing T56 gearbox PWM translator — BLE config and OTA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_blue_plus: ^1.34.5
  google_fonts: ^6.2.1
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  crypto: ^3.0.6
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/presets/t56_stock.json
    - assets/presets/blank_bmw_outputs.json
    - assets/presets/bmw_e46_t56.json
